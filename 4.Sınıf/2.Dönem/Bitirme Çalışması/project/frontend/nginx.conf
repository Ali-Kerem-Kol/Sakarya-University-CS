server {
    listen 80;
    server_name localhost;

    # Allow large file uploads
    client_max_body_size 50M;
    error_page 413 = /__413_json;

    root /usr/share/nginx/html;
    index index.html;

    # SPA Fallback: Redirect all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy: Forward /api requests to the backend service
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for large uploads to prevent timeouts/issues
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location = /__413_json {
        internal;
        default_type application/json;
        return 413 '{"errorCode":"FILE_TOO_LARGE","message":"File exceeds max allowed size"}';
    }

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";
}
