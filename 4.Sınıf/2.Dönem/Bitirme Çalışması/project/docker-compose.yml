services:
  db:
    image: postgres:16-alpine
    container_name: ats-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ats}
      POSTGRES_USER: ${POSTGRES_USER:-ats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats}
      TZ: Europe/Istanbul
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ats-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats} -d ${POSTGRES_DB:-ats}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ats-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_pass}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      TZ: Europe/Istanbul
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ats-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: ats-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # UI
      - "1025:1025" # SMTP
    networks:
      - ats-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8025/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ats}
      DB_USERNAME: ${DB_USERNAME:-ats}
      DB_PASSWORD: ${DB_PASSWORD:-ats}
      SEED_DATA: true
      LOG_LEVEL: INFO
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-in-prod-please-very-long}
      APP_STORAGE_ROOT: /app/storage
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@32bit.com.tr}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin12345!}
      SEED_ADMIN_FIRSTNAME: ${SEED_ADMIN_FIRSTNAME:-System}
      SEED_ADMIN_LASTNAME: ${SEED_ADMIN_LASTNAME:-Administrator}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 50MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 50MB
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-noreply@32bit.com.tr}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:3000}
      APP_STARTUP_VERIFY_MAIL: ${APP_STARTUP_VERIFY_MAIL:-true}
      TZ: Europe/Istanbul
    volumes:
      - storage_data:/app/storage
    networks:
      - ats-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ats-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ats-net:
    driver: bridge

volumes:
  db_data:
  storage_data:
  pgadmin_data:
